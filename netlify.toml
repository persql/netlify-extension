# Netlify extension build config.
# Verified against @netlify/create-sdk@3.0.4 / @netlify/sdk@5.0.4 (the values
# the official scaffolder emits).
#
# The OAuth provider connection (Authorization URL, Token URL, Client ID,
# Client Secret, Scopes) is set in the extension's settings UI on the Netlify
# dashboard, NOT here:
#   Authorization URL  https://api.persql.com/oauth/authorize
#   Token URL          https://api.persql.com/oauth/token
#   Client ID/Secret   from PerSQL console -> OAuth apps (confidential)
#   Scopes             database
# Register Netlify's fixed callback https://api.netlify.com/auth/done/identeer
# as a redirect URI on the PerSQL OAuth app.

[build]
command = "netlify-extension build"
publish = ".ntli/site/static"

[dev]
command = "netlify-extension dev"
port = 8989

[functions]
directory = "src/endpoints"

[[plugins]]
package = "@netlify/netlify-plugin-netlify-extension"
