# Netlify extension manifest.
#
# Shape verified against @netlify/sdk@5.0.4:
#   ExtensionConfigurationFileSchema = { config: { name?, description?, slug, ui? } }
# Everything nests under `config:`. `slug` must be lowercase-with-dashes and
# must match the slug Netlify auto-generates when you create the extension
# (Extensions -> Created by your team -> Create an extension): copy it from the
# Manage section, paste below, then commit + redeploy.
# See https://developers.netlify.com/sdk/publish/publish-extensions/
config:
  name: PerSQL
  slug: persql-extension
  # `ui.surfaces` / `ui.build` come from the generated scaffold
  # (npm create @netlify/sdk@latest). Permission scopes are chosen in the
  # Netlify UI at create time (least privilege: site env-var write).
